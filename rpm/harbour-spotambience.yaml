Name: harbour-spotambience
Summary: Spot-price ambience automation for Sailfish OS
Version: 1.0.0
Release: 1
Group: Applications/Internet
URL: https://github.com/Ag9HOn/spot-ambience
License: GPLv3
Sources:
  - '%{name}-%{version}.tar.bz2'
Description: |
  Spot Ambience follows Finland's quarter-hour day-ahead electricity prices,
  presents history and forecasts, and changes the active Sailfish ambience.
  Spot price data: Nord Pool day-ahead prices for Finland, published through
  Elering LIVE by Elering AS.
Builder: cmake
PkgConfigBR:
  - sailfishapp
  - Qt5Core
  - Qt5DBus
  - Qt5Gui
  - Qt5Network
  - Qt5Qml
  - Qt5Quick
  - Qt5Test
  - mlite5
PkgBR:
  - cmake
Requires:
  - sailfishsilica-qt5
Files:
  - '%{_bindir}/%{name}'
  - '%{_datadir}/%{name}/qml'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/hicolor/86x86/apps/%{name}.png'
  - '%{_datadir}/icons/hicolor/108x108/apps/%{name}.png'
  - '%{_datadir}/icons/hicolor/128x128/apps/%{name}.png'
  - '%{_datadir}/icons/hicolor/172x172/apps/%{name}.png'
